<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Protected artifact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #59636e;
    --border: #d8d2cc;
    --card: #ffffff;
    --accent: #c73d1d;
    --error: #c4573e;
  }
  /* Dark = Anvil Nine "Molten Steel", matching the dashboard lock card.
     Follows the OS unless the shared theme toggle forces a mode. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0b0d0f; --fg: #edeae4; --muted: #9da3a9;
      --border: #242b33; --card: #101317; --accent: #ff7550; --error: #e08a72;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0b0d0f; --fg: #edeae4; --muted: #9da3a9;
    --border: #242b33; --card: #101317; --accent: #ff7550; --error: #e08a72;
  }
  :root[data-theme="light"] {
    --bg: #ffffff; --fg: #1f2328; --muted: #59636e;
    --border: #d8d2cc; --card: #ffffff; --accent: #c73d1d; --error: #c4573e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100%; padding: 24px;
    background: var(--bg); color: var(--fg);
    background-image:
      radial-gradient(900px 380px at 50% -10%, rgba(240, 80, 42, .08) 0%, transparent 72%),
      radial-gradient(var(--border) 1px, transparent 1px);
    background-size: auto, 12px 12px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #card {
    width: 100%; max-width: 340px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
  }
  #card h1 {
    margin: 0 0 4px; font-family: 'Archivo', system-ui, sans-serif; font-size: 17px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #card p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  input {
    width: 100%; padding: 8px 10px; margin-bottom: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--fg);
    font-size: 14px; font-family: inherit;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  button {
    width: 100%; padding: 10px 12px; border: 0; border-radius: 4px;
    background: #f0502a; color: #0b0d0f;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    transition: background .2s ease, box-shadow .2s ease;
  }
  button:hover { background: #ff7550; box-shadow: 0 0 24px rgba(240, 80, 42, .35); }
  button:disabled { opacity: 0.6; cursor: default; box-shadow: none; }
  #error { min-height: 18px; margin: 10px 0 0; font-size: 13px; color: var(--error); }
  #card.shake { animation: shake .3s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @media (prefers-reduced-motion: reduce) { #card.shake { animation: none; } }
</style>
</head>
<body>
  <form id="card" autocomplete="off">
    <h1>Protected artifact</h1>
    <p>This artifact is password protected.</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus>
    <button id="submit" type="submit">Unlock</button>
    <p id="error"></p>
  </form>

  <script>
    // Honor a shared theme choice (auto/light/dark) so the gate matches the rest.
    (function () {
      try {
        var t = localStorage.getItem('artifactTheme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
    var UNLOCK_URL = '/a/{{SLUG}}/unlock';
    var form = document.getElementById('card');
    var pw = document.getElementById('pw');
    var btn = document.getElementById('submit');
    var err = document.getElementById('error');

    function shake(msg) {
      err.textContent = msg;
      form.classList.remove('shake');
      void form.offsetWidth;
      form.classList.add('shake');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!pw.value) return;
      btn.disabled = true;
      err.textContent = '';
      fetch(UNLOCK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw.value }),
      }).then(function (res) {
        if (res.ok) { location.reload(); return; }
        return res.json().catch(function () { return {}; }).then(function (d) {
          btn.disabled = false;
          shake(d.error || 'Incorrect password');
          pw.value = '';
          pw.focus();
        });
      }).catch(function () {
        btn.disabled = false;
        shake('Network error');
      });
    });
  </script>
</body>
</html>
