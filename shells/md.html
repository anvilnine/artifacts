<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: light dark;
    --md-font: {{FONT}};
    --md-max: {{MAXWIDTH}};
    --md-size: {{FONTSIZE}};
    --fg: #1f2328;
    --bg: #ffffff;
    --link: #0969da;
    --codebg: #f6f8fa;
    --quote: #59636e;
    --border: #d1d9e0;
  }
  /* Auto: follow the OS when no explicit data-theme=light override is set. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --fg: #e6edf3; --bg: #0d1117; --link: #58a6ff;
      --codebg: #161b22; --quote: #8b949e; --border: #30363d;
    }
  }
  /* Forced dark, regardless of OS. */
  :root[data-theme="dark"] {
    --fg: #e6edf3; --bg: #0d1117; --link: #58a6ff;
    --codebg: #161b22; --quote: #8b949e; --border: #30363d;
  }
  body {
    font-family: var(--md-font);
    font-size: var(--md-size);
    line-height: 1.6;
    max-width: var(--md-max);
    margin: 0 auto;
    padding: 32px 20px 80px;
    color: var(--fg);
    background: var(--bg);
  }
  a { color: var(--link); }
  pre { background: var(--codebg); padding: 16px; border-radius: 6px; overflow-x: auto; }
  code { background: var(--codebg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; line-height: 1.5; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  pre code { padding: 0; background: none; }
  blockquote { margin: 0; padding-left: 16px; border-left: 4px solid var(--border); color: var(--quote); }
  img { max-width: 100%; }
  table { border-collapse: collapse; display: block; overflow-x: auto; }
  table th, table td { border: 1px solid var(--border); padding: 6px 13px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
</style>
<script>
  (function () {
    var root = document.documentElement;
    function apply(t) {
      if (t === 'dark' || t === 'light') root.setAttribute('data-theme', t);
      else root.removeAttribute('data-theme'); // 'auto' -> follow prefers-color-scheme
    }
    var stored;
    try { stored = localStorage.getItem('artifactTheme'); } catch (e) {}
    apply(stored || '{{THEME}}');
    window.addEventListener('message', function (e) {
      if (e.origin !== window.location.origin) return;
      if (e.data && e.data.artifactTheme) apply(e.data.artifactTheme);
    });
    window.addEventListener('storage', function (e) {
      if (e.key === 'artifactTheme') apply(e.newValue || '{{THEME}}');
    });
  })();
</script>
</head>
<body>
{{CONTENT}}
</body>
</html>
